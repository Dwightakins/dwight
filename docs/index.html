<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dwight's Daily Quote</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --bg-deep: #02060d;
        --ink: #eff7ff;
        --muted: #8ca0b8;
        --card: rgba(8, 18, 34, 0.78);
        --line: rgba(132, 165, 204, 0.16);
        --gold: #ffb85c;
        --teal: #52d6c5;
        --coral: #ff8b7b;
        --glow: rgba(82, 214, 197, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
        background:
          radial-gradient(circle at top left, rgba(255, 184, 92, 0.16), transparent 24%),
          radial-gradient(circle at bottom right, rgba(82, 214, 197, 0.12), transparent 26%),
          linear-gradient(160deg, #0d1930 0%, var(--bg) 45%, var(--bg-deep) 100%);
        color: var(--ink);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        filter: blur(10px);
        opacity: 0.7;
        pointer-events: none;
      }

      body::before {
        top: 72px;
        left: -60px;
        width: 180px;
        height: 180px;
        background: rgba(255, 139, 123, 0.18);
      }

      body::after {
        right: -40px;
        bottom: 80px;
        width: 210px;
        height: 210px;
        background: rgba(82, 214, 197, 0.16);
      }

      .shell {
        width: min(980px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
        align-content: center;
        min-height: calc(100vh - 48px);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: var(--muted);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(16, 31, 56, 0.72);
        border: 1px solid rgba(132, 165, 204, 0.18);
        box-shadow: 0 14px 34px rgba(2, 6, 13, 0.36);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--teal);
        box-shadow: 0 0 0 8px rgba(47, 143, 131, 0.12);
      }

      .frame {
        position: relative;
        overflow: hidden;
        border-radius: 34px;
        border: 1px solid rgba(132, 165, 204, 0.16);
        background: var(--card);
        box-shadow: 0 30px 80px rgba(2, 6, 13, 0.5);
        backdrop-filter: blur(14px);
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(255, 184, 92, 0.09), transparent 35%),
          linear-gradient(315deg, rgba(82, 214, 197, 0.08), transparent 28%);
        pointer-events: none;
      }

      .card {
        position: relative;
        display: grid;
        gap: 28px;
        padding: 34px;
      }

      .hero {
        display: grid;
        gap: 14px;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.82rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--gold);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0;
        max-width: 9ch;
        font-size: clamp(2.5rem, 7vw, 5.5rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .subcopy {
        margin: 0;
        max-width: 42ch;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .quote-panel {
        display: grid;
        gap: 20px;
        padding: 26px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(18, 33, 56, 0.92), rgba(9, 19, 36, 0.9));
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        transform: translateY(14px);
        opacity: 0;
        animation: rise 700ms ease forwards;
      }

      blockquote {
        margin: 0;
        font-size: clamp(1.6rem, 3vw, 2.4rem);
        line-height: 1.45;
      }

      .author {
        margin: 0;
        font-size: 1rem;
        color: var(--coral);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding-top: 4px;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: linear-gradient(135deg, var(--teal), #2ca3ff);
        color: #08111f;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        transition:
          transform 160ms ease,
          opacity 160ms ease,
          box-shadow 160ms ease;
        box-shadow: 0 16px 30px var(--glow);
      }

      .button:hover {
        transform: translateY(-1px);
        opacity: 0.95;
      }

      .button:active {
        transform: translateY(1px);
      }

      .note {
        margin: 0;
        font-size: 0.92rem;
        color: var(--muted);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      @keyframes rise {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .card {
          padding: 22px;
        }

        .topbar,
        .footer {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="badge">
          <span class="dot"></span>
          <span>Updated automatically every day</span>
        </div>
      </div>

      <main class="frame">
        <section class="card">
          <div class="hero">
            <p class="eyebrow">Dwight's Daily Inspiration</p>
            <h1>One good quote for every day.</h1>
          </div>

          <section class="quote-panel">
            <blockquote id="quote">Loading today's quote...</blockquote>
            <p class="author" id="author"></p>
            <div class="footer">
              <p class="meta" id="updated"></p>
              <button class="button" id="share-button" type="button">
                Copy Site Link
              </button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script>
      const shareButton = document.getElementById("share-button");

      async function loadQuote() {
        const response = await fetch("./latest-quote.json", { cache: "no-store" });
        const data = await response.json();

        document.getElementById("quote").textContent = '"' + data.quote + '"';
        document.getElementById("author").textContent = "- " + data.author;
        document.getElementById("updated").textContent =
          "Last updated: " + data.updated_at;
      }

      async function copySiteLink() {
        try {
          await navigator.clipboard.writeText(window.location.href);
          shareButton.textContent = "Link Copied";
          window.setTimeout(() => {
            shareButton.textContent = "Copy Site Link";
          }, 1600);
        } catch {
          shareButton.textContent = "Copy failed";
        }
      }

      shareButton.addEventListener("click", copySiteLink);

      loadQuote().catch(() => {
        document.getElementById("quote").textContent =
          "The quote could not be loaded yet.";
        document.getElementById("author").textContent = "";
        document.getElementById("updated").textContent =
          "Push this project to GitHub and enable GitHub Pages to view it online.";
        shareButton.disabled = true;
      });
    </script>
  </body>
</html>
